services:
  - type: web
    name: option-form
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: option-form-db
          property: connectionString

databases:
  - name: option-form-db
    plan: free
    postgresMajorVersion: 16
